    z-index:999;

}


@keyframes fall{

0%{

}

100%{
    transform:translateY(110vh) rotate(360deg);
}

}

@keyframes blink{

from{

}

snow.innerHTML="❄";

snow.style.left=Math.random()*100+"vw";

snow.style.animationDuration=(3+Math.random()*6)+"s";
