        body{

        h1{

            color:#ffe600;
        }

        table{
            width:100%;
            margin-top:20px;
            border-collapse:collapse;
        }

        td{
            padding:12px;
            border-bottom:1px solid rgba(255,255,255,0.3);
            font-size:20px;
        }

        td:first-child{
            font-weight:bold;
            width:35%;
            color:#ffe600;
        }

        .btn{
            display:inline-block;
            margin-top:25px;
            padding:12px 25px;
            background:white;
            color:#dd191d;
            text-decoration:none;
            border-radius:30px;
            font-weight:bold;
        }

        .btn:hover{
            background:#ffe600;
        }

        footer{
            text-align:center;
            padding:20px;
            margin-top:40px;
            background:rgba(0,0,0,0.25);
        }
    </style>
</head>
