<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประวัติส่วนตัว</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:"Sarabun",sans-serif;
        }

        body{
            /* ท้องฟ้าธีมอาณาจักรสีชมพูอมแดงเข้มลึกลับ */
            background: linear-gradient(135deg, #2b001a, #6b0f24, #b81d3d, #ff5e7e);
            color:white;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* --- พระจันทร์สีเลือด (Blood Moon) --- */
        .blood-moon {
            position: fixed;
            top: 90px;
            right: 8%;
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #ff3344, #990011);
            border-radius: 50%;
            box-shadow: 0 0 40px #ff1a35, 0 0 80px #ff5e7e;
            z-index: 1;
        }

        /* --- เงาปราสาทและบ้านเมือง (Kingdom Silhouette) --- */
        .kingdom-bg {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            min-width: 1000px;
            height: auto;
            opacity: 0.3;
            z-index: 2;
            pointer-events: none;
        }

        /* --- ต้นไม้ใบหญ้าเคลื่อนไหว (Swaying Trees & Grass) --- */
        .nature-layer {
            position: fixed;
            bottom: 75px;
            width: 100%;
            height: auto;
            z-index: 3;
            pointer-events: none;
        }
        
        .spooky-tree {
            position: absolute;
            bottom: 0;
            fill: #1a0208;
            transform-origin: bottom center;
            animation: sway 4s ease-in-out infinite alternate;
        }
        .tree-left { left: 5%; width: 180px; }
        .tree-right { right: 5%; width: 220px; animation-duration: 5s; }

        .grass-blade {
            position: absolute;
            bottom: -5px;
            fill: #100105;
            transform-origin: bottom center;
            animation: sway 2.5s ease-in-out infinite alternate;
        }
        .grass1 { left: 25%; width: 60px; }
        .grass2 { right: 30%; width: 80px; animation-duration: 3s; }

        @keyframes sway {
            0% { transform: rotate(-2deg) skewX(-1deg); }
            100% { transform: rotate(3deg) skewX(2deg); }
        }

        /* พื้นดินของอาณาจักร */
        .ground {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 85px;
            background: linear-gradient(to top, #100105, #24050d);
            border-top: 3px solid #420612;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.7);
            z-index: 4;
        }

        /* เมนู */
        nav{
            background: rgba(26, 2, 8, 0.8);
            padding:15px;
            text-align:center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 2px solid #ff5e7e;
            backdrop-filter: blur(5px);
        }

        nav a{
            color: #ffb7d5; /* สีชมพูอ่อนพาสเทล */
            text-decoration:none;
            margin:0 15px;
            font-size:18px;
            font-weight:bold;
            transition: 0.3s;
        }

        nav a:hover{
            color: #ffe600; /* ไฮไลท์สีเหลืองทอง */
            text-shadow: 0 0 10px #ff3344;
        }

        /* กล่องเนื้อหา */
        .container{
            width:85%;
            max-width:700px;
            margin:50px auto 140px auto;
            background: rgba(26, 2, 8, 0.75); /* ปรับพื้นหลังกล่องให้เข้ากับธีมเข้ม */
            padding:35px;
            border-radius:20px;
            text-align:center;
            box-shadow: 0 10px 30px rgba(255, 94, 126, 0.2);
            border: 2px solid #ff5e7e;
            backdrop-filter: blur(8px);
            position: relative;
            z-index: 10;
        }

        img{
            width:200px;
            height:200px;
            border-radius:50%;
            object-fit:cover;
            border: 5px solid #ff5e7e;
            margin-bottom:20px;
            box-shadow: 0 0 20px rgba(255, 94, 126, 0.5);
        }

        h1{
            margin-bottom:20px;
            color:#ffe600;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        table{
            width:100%;
            margin-top:20px;
            border-collapse:collapse;
        }

        td{
            padding:12px;
            border-bottom:1px solid rgba(255, 94, 126, 0.3);
            font-size:20px;
            text-shadow: 1px 1px 2px #000;
        }

        td:first-child{
            font-weight:bold;
            width:35%;
            color:#ffe600;
        }

        /* ปุ่มกด */
        .btn{
            display:inline-block;
            margin-top:25px;
            padding:12px 35px;
            background: linear-gradient(90deg, #ff5e7e, #b81d3d);
            color: white;
            text-decoration:none;
            border-radius:30px;
            font-weight:bold;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .btn:hover{
            background: #ffe600;
            color: #2b001a;
            transform: scale(1.05);
            box-shadow: 0 0 15px #ffe600;
        }

        footer{
            text-align:center;
            padding:20px;
            position: relative;
            z-index: 20;
            background: #100105;
            color: #8c7379;
        }
    </style>
</head>
