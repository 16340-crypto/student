<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio นาย ณฐกร</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: "Sarabun", sans-serif;
        }

        body {
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            background-color: #0b0200; /* กันเหนียวถ้าเน็ตช้า วิดีโอยังไม่โหลด */
        }

        /* วิดีโอพื้นหลังเปลวไฟลุกโชน */
        .video-background {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -2;
            object-fit: cover;
            filter: brightness(0.6) contrast(1.2) saturate(1.3);
        }

        /* เลเยอร์ย้อมสีแสงไฟให้ดูมีมิติเงาเฉด */
        .fire-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(0deg, rgba(221, 25, 29, 0.2) 0%, rgba(255, 140, 66, 0.1) 50%, rgba(0, 0, 0, 0.7) 100%);
            z-index: -1;
            pointer-events: none;
        }

        /* เมนูสไตล์ Cyber Glow */
        nav{
            background: rgba(15, 5, 5, 0.75);
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            backdrop-filter: blur(10px);
            border-bottom: 2px solid #ff4500;
            box-shadow: 0 5px 25px rgba(221, 25, 29, 0.4);
            z-index: 100;
        }

        nav a{
            color: #ffcc00;
            text-decoration: none;
            margin: 0 20px;
            font-size: 19px;
            font-weight: bold;
            transition: 0.4s;
            text-shadow: 0 0 10px rgba(255, 69, 0, 0.5);
        }

        nav a:hover{
            color: #ffffff;
            text-shadow: 0 0 20px #ff4500, 0 0 40px #ff8c42;
        }

        /* กล่องเนื้อหากระจกสะท้อนแสงไฟ */
        .container{
            width: 85%;
            max-width: 900px;
            margin: 60px auto;
            background: rgba(20, 5, 5, 0.55);
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 0 40px rgba(221, 25, 29, 0.3), inset 0 0 20px rgba(255, 140, 66, 0.2);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 140, 66, 0.2);
            animation: containerGlow 4s ease-in-out infinite alternate;
        }

        @keyframes containerGlow {
            0% { box-shadow: 0 0 30px rgba(221, 25, 29, 0.3); }
            100% { box-shadow: 0 0 50px rgba(255, 140, 66, 0.5); }
        }

        /* รูปโปรไฟล์ขอบไฟเหลืองส้ม */
        img{
            width: 220px;
            height: 220px;
            border-radius: 50%;
            border: 4px solid #ff8c42;
            object-fit: cover;
            margin-bottom: 25px;
            box-shadow: 0 0 30px #dd191d;
            transition: 0.5s;
        }

        img:hover {
            transform: scale(1.05) rotate(3deg);
            border-color: #ffe600;
            box-shadow: 0 0 45px #ffe600;
        }

        h1{
            font-size: 42px;
            margin-bottom: 10px;
            letter-spacing: 1px;
            background: linear-gradient(to right, #ffffff, #ffcc00, #ff4500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255, 69, 0, 0.3);
        }

        h2{
            color: #ff8c42;
            margin-bottom: 25px;
            font-size: 26px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 140, 66, 0.5);
        }

        p{
            font-size: 21px;
            margin: 12px 0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        /* ปุ่มกดเอฟเฟกต์ลาวาหลอมเหลว */
        .btn{
            display: inline-block;
            margin-top: 25px;
            padding: 14px 35px;
            background: linear-gradient(45deg, #dd191d, #ff8c42);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 0 5px 20px rgba(221, 25, 29, 0.4), 0 0 0 2px rgba(255,255,255,0.1);
            transition: 0.4s;
        }

        .btn:hover{
            background: linear-gradient(45deg, #ff8c42, #ffe600);
            color: #000;
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 10px 30px #ffe600;
        }

        footer{
            text-align: center;
            padding: 25px;
            margin-top: 60px;
            background: rgba(10, 2, 2, 0.85);
            border-top: 1px solid rgba(255, 69, 0, 0.3);
            color: #aaa;
        }
    </style>

</head>

<body>

    <video autoplay loop muted playsinline class="video-background">
        <source src="https://assets.mixkit.co/videos/preview/mixkit-bright-neon-flames-background-43407-large.mp4" type="video/mp4">
    </video>
    
    <div class="fire-overlay"></div>

    <nav>
        <a href="profile.html">ประวัติส่วนตัว</a>
        <a href="education.html">ประวัติการศึกษา</a>
        <a href="award.html">ผลงาน</a>
        <a href="contact.html">ช่องทางการติดต่อ</a>
    </nav>

    <div class="container">

        <img src="images/IMG_7334.JPG" alt="รูปภาพ">

        <h1>นาย ณฐกร วิชัยชะนะ</h1>
        <h2>Portfolio</h2>

        <p>🔥 นักเรียนชั้นมัธยมศึกษาปีที่ 6/1</p>
        <p>🏫 โรงเรียนพานทอง</p>

        <a href="profile.html" class="btn">
            ดูประวัติส่วนตัว
        </a>

    </div>

    <footer>
        © 2026 Portfolio | นาย ณฐกร วิชัยชะนะ
    </footer>

</body>
</html>
