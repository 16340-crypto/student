<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio นาย ณฐกร</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: "Sarabun", sans-serif;
        }

        body{
            /* ธีมฮาโลวีน: ม่วงเข้ม ไล่ไป ส้ม */
            background: linear-gradient(135deg, #1d0033, #4a154b, #ff7b00);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* --- CSS ค้างคาวบินแอนิเมชัน --- */
        .bat {
            position: absolute;
            font-size: 24px;
            opacity: 0.6;
            pointer-events: none;
            animation: fly 12s linear infinite;
        }
        .bat1 { top: 15%; left: -50px; animation-delay: 0s; }
        .bat2 { top: 45%; left: -50px; animation-delay: 4s; animation-duration: 15s; }
        .bat3 { top: 75%; left: -50px; animation-delay: 2s; animation-duration: 10s; }

        @keyframes fly {
            0% {
                transform: translate(0, 0) scale(1) rotate(0deg);
                left: -50px;
            }
            50% {
                transform: translate(50vw, -30px) scale(1.2) rotate(15deg);
            }
            100% {
                transform: translate(110vw, 20px) scale(0.8) rotate(-10deg);
                left: 100%;
            }
        }

        /* เมนู */
        nav{
            background: rgba(29, 0, 51, 0.75);
            padding:15px;
            text-align:center;
            position: sticky;
            top:0;
            z-index: 100;
            border-bottom: 2px solid #ff9900;
            backdrop-filter: blur(5px);
        }

        nav a{
            color:#ffb703; /* สีเหลืองทองฮาโลวีน */
            text-decoration:none;
            margin:0 15px;
            font-size:18px;
            font-weight:bold;
            transition:0.3s;
        }

        nav a:hover{
            color:#ffffff;
            text-shadow: 0 0 10px #ff7b00, 0 0 20px #ff7b00;
        }

        /* กล่องเนื้อหา */
        .container{
            width:80%;
            max-width:900px;
            margin:60px auto;
            background: rgba(29, 0, 51, 0.6); /* กล่องสีม่วงเข้มโปร่งแสง */
            padding:40px 30px;
            border-radius:20px;
            text-align:center;
            box-shadow: 0 10px 30px rgba(255, 123, 0, 0.3); /* เรืองแสงสีส้ม */
            border: 2px solid #ff7b00;
            backdrop-filter: blur(8px);
            position: relative;
            z-index: 10;
        }

        img{
            width:220px;
            height:220px;
            border-radius:50%;
            border:6px solid #ff9900; /* ขอบสีส้มเหลือง */
            object-fit:cover;
            margin-bottom:20px;
            box-shadow:0 5px 25px rgba(255, 153, 0, 0.5);
        }

        h1{
            font-size:40px;
            margin-bottom:10px;
            color: #ffffff;
            text-shadow: 2px 2px 4px #000;
        }

        h2{
            color:#ffe600; /* สีเหลืองสว่าง */
            margin-bottom:20px;
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(255, 230, 0, 0.6);
        }

        p{
            font-size:20px;
            margin:12px 0;
            text-shadow: 1px 1px 2px #000;
        }

        /* ปุ่มกด */
        .btn{
            display:inline-block;
            margin-top:25px;
            padding:12px 30px;
            background: #ff7b00; /* ปุ่มสีส้ม */
            color: #1d0033; /* ตัวหนังสือสีม่วงเข้ม */
            text-decoration:none;
            border-radius:30px;
            font-weight:bold;
            font-size: 18px;
            transition:0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .btn:hover{
            background:#ffe600; /* เปลี่ยนเป็นสีเหลืองตอนชี้ */
            color: #1d0033;
            transform:scale(1.08);
            box-shadow: 0 0 20px #ffe600;
        }

        /* ฟักทองดุ๊กดิ๊ก */
        .pumpkin-icon {
            display: inline-block;
            animation: bounce 2s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-5px) scale(1.05); }
        }

        footer{
            text-align:center;
            padding:25px;
            margin-top:60px;
            background: #1d0033;
            border-top: 1px solid #4a154b;
            color: #aaa;
        }
    </style>

</head>

<body>

    <div class="bat bat1">🦇</div>
    <div class="bat bat2">🦇</div>
    <div class="bat bat3">🦇</div>

    <nav>
        <a href="profile.html">ประวัติส่วนตัว</a>
        <a href="education.html">ประวัติการศึกษา</a>
        <a href="award.html">ผลงาน</a>
        <a href="contact.html">ช่องทางการติดต่อ</a>
    </nav>

    <div class="container">

        <img src="images/IMG_7334.JPG" alt="รูปภาพ">

        <h1>นาย ณฐกร วิชัยชะนะ</h1>
        <h2><span class="pumpkin-icon">🎃</span> HALLOWEEN PORTFOLIO <span class="pumpkin-icon">🎃</span></h2>

        <p>🎓 นักเรียนชั้นมัธยมศึกษาปีที่ 6/1</p>
        <p>🏫 โรงเรียนพานทอง</p>

        <a href="profile.html" class="btn">
           💀 เจาะลึกประวัติส่วนตัว
        </a>

    </div>

    <footer>
        © 2026 Portfolio | นาย ณฐกร วิชัยชะนะ
    </footer>

</body>
</html>
