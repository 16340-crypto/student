<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio นาย ณฐกร</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: "Sarabun", sans-serif;
        }

        body{
            background: linear-gradient(135deg, #120024, #3a0d3c, #cc5200);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* --- ปราสาทฮาโลวีน (ย้ายมาฝั่งซ้าย ไม่โดนบัง) --- */
        .castle-bg {
            position: fixed;
            bottom: 75px; 
            left: 2%; /* ย้ายมาฝั่งซ้าย */
            width: 35%;
            max-width: 400px;
            min-width: 250px;
            height: auto;
            opacity: 0.4; /* เพิ่มความเข้มขึ้นเล็กน้อยเพื่อให้เห็นชัด */
            z-index: 3;
            pointer-events: none;
        }

        /* --- เงาต้นไม้ฮาโลวีน (Spooky Trees) --- */
        .tree {
            position: fixed;
            bottom: 80px;
            height: auto;
            opacity: 0.35;
            z-index: 3;
            pointer-events: none;
        }
        .tree-left {
            left: 25%;
            width: 150px;
        }
        .tree-right1 {
            right: 5%;
            width: 220px;
        }
        .tree-right2 {
            right: 22%;
            width: 130px;
            bottom: 85px;
            opacity: 0.25;
        }

        /* --- พื้นดินสีน้ำตาลอมม่วง --- */
        .ground {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100px;
            background: linear-gradient(to top, #2b1820, #422835);
            border-top: 4px solid #1a0f14;
            box-shadow: 0 -10px 20px rgba(0,0,0,0.5);
            z-index: 4;
        }

        /* --- ค้างคาวบินแอนิเมชัน (เพิ่มเป็น 6 ตัว) --- */
        .bat {
            position: absolute;
            opacity: 0.6;
            pointer-events: none;
            animation: fly 14s linear infinite;
            z-index: 5;
        }
        /* ปรับขนาดและเวลาบินให้เหลื่อมกันดูเป็นธรรมชาติ */
        .bat1 { font-size: 24px; top: 8%; left: -50px; animation-delay: 0s; animation-duration: 14s; }
        .bat2 { font-size: 30px; top: 25%; left: -50px; animation-delay: 4s; animation-duration: 18s; }
        .bat3 { font-size: 20px; top: 45%; left: -50px; animation-delay: 1s; animation-duration: 11s; }
        .bat4 { font-size: 28px; top: 60%; left: -50px; animation-delay: 6s; animation-duration: 16s; }
        .bat5 { font-size: 22px; top: 15%; left: -50px; animation-delay: 8s; animation-duration: 13s; }
        .bat6 { font-size: 26px; top: 75%; left: -50px; animation-delay: 3s; animation-duration: 15s; }

        @keyframes fly {
            0% {
                transform: translate(0, 0) scale(1) rotate(0deg);
                left: -50px;
            }
            50% {
                transform: translate(50vw, -40px) scale(1.2) rotate(15deg);
            }
            100% {
                transform: translate(110vw, 20px) scale(0.8) rotate(-10deg);
                left: 100%;
            }
        }

        /* เมนู */
        nav{
            background: rgba(18, 0, 36, 0.85);
            padding:15px;
            text-align:center;
            position: sticky;
            top:0;
            z-index: 100;
            border-bottom: 2px solid #ff9900;
            backdrop-filter: blur(5px);
        }

        nav a{
            color:#ffb703; 
            text-decoration:none;
            margin:0 15px;
            font-size:18px;
            font-weight:bold;
            transition:0.3s;
        }

        nav a:hover{
            color:#ffffff;
            text-shadow: 0 0 10px #ff7b00, 0 0 20px #ff7b00;
        }

        /* กล่องเนื้อหา */
        .container{
            width:80%;
            max-width:650px; /* ปรับให้แคบลงเล็กน้อยเพื่อให้เห็นองค์ประกอบด้านข้างชัดขึ้น */
            margin:50px auto 140px auto; 
            background: rgba(18, 0, 36, 0.75); 
            padding:40px 30px;
            border-radius:20px;
            text-align:center;
            box-shadow: 0 10px 30px rgba(255, 123, 0, 0.25);
            border: 2px solid #ff7b00;
            backdrop-filter: blur(8px);
            position: relative;
            z-index: 10;
        }

        img{
            width:220px;
            height:220px;
            border-radius:50%;
            border:6px solid #ff9900;
            object-fit:cover;
            margin-bottom:20px;
            box-shadow:0 5px 25px rgba(255, 153, 0, 0.5);
        }

        h1{
            font-size:40px;
            margin-bottom:10px;
            color: #ffffff;
            text-shadow: 2px 2px 4px #000;
        }

        h2{
            color:#ffe600; 
            margin-bottom:20px;
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(255, 230, 0, 0.6);
        }

        p{
            font-size:20px;
            margin:12px 0;
            text-shadow: 1px 1px 2px #000;
        }

        /* ปุ่มกด */
        .btn{
            display:inline-block;
            margin-top:25px;
            padding:12px 30px;
            background: #ff7b00; 
            color: #120024;
            text-decoration:none;
            border-radius:30px;
            font-weight:bold;
            font-size: 18px;
            transition:0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .btn:hover{
            background:#ffe600; 
            color: #120024;
            transform:scale(1.08);
            box-shadow: 0 0 20px #ffe600;
        }

        .pumpkin-icon {
            display: inline-block;
            animation: bounce 2s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-5px) scale(1.05); }
        }

        footer{
            text-align:center;
            padding:20px;
            position: relative;
            z-index: 20;
            background: #2b1820; 
            color: #b5a2ad;
            font-size: 14px;
        }
    </style>

</head>
